# ===========================
# Application
# ===========================
spring.application.name=student-feedback-backend
server.port=8080

# ===========================
# MySQL DataSource
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Student_Feedback_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Aravind@17}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Jackson (JSON serialization)
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ===========================
# Mail Data (Gmail example)
# ===========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:nelavelliaravind@gmail.com}
spring.mail.password=${MAIL_PASSWORD:vawrksseaomahckr}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===========================
# App Configuration
# ===========================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.notifications.enabled=${APP_MAIL_NOTIFICATIONS_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.feedback.deadline-reminder.cron=${APP_FEEDBACK_DEADLINE_REMINDER_CRON:0 0 9 * * *}
app.feedback.deadline-reminder.days-before=${APP_FEEDBACK_DEADLINE_REMINDER_DAYS_BEFORE:1}
app.feedback.deadline-reminder.zone=${APP_FEEDBACK_DEADLINE_REMINDER_ZONE:Asia/Kolkata}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
